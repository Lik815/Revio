[options]
packageManager = "pnpm"

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "cd apps/api && npx prisma generate --schema prisma/schema.production.prisma",
  "cd apps/api && npx tsc -p tsconfig.json"
]

[deploy]
# --accept-data-loss ist nötig, damit db push destruktive Schema-Änderungen
# (z.B. Entfernen der alten TherapistSlot-Tabelle im dynamischen Buchungssystem)
# nicht-interaktiv anwendet. Ohne das Flag verweigert db push die Sync und die
# Prod-DB bleibt out of sync (fehlende Tabellen/Spalten → 500 P2021).
cmd = "cd apps/api && npx prisma db push --schema prisma/schema.production.prisma --skip-generate --accept-data-loss && TZ=Europe/Berlin node dist/server.js"
