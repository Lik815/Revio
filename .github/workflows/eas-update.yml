name: EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - '!apps/mobile/src/_archive/**'
  workflow_dispatch: {}

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Publish EAS Update
        working-directory: apps/mobile
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          MESSAGE=$(printf '%s' "$COMMIT_MESSAGE" | head -n 1)
          MESSAGE=${MESSAGE:-"Manual update"}
          eas update --branch main --message "$MESSAGE" --non-interactive
